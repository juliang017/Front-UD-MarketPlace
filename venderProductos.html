<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vender productos</title>

    <link rel="stylesheet" href="css/venderProductos.css">
</head>
<body>

    <header>

        <div class="logo">

            🎓 UD Marketplace

        </div>

        <div class="busqueda">

            <input
                type="text"
                placeholder="Buscar productos...">

        </div>

        <div id="accionesUsuario">
		

            <button type="button" id="btnComprarProductos">
                Comprar productos
            </button>

            <button type="button" id="btnPerfil">
                Mi perfil
            </button>
            
            <button id="btnCerrarSesion">
                Cerrar sesión
            </button>
	    		
        </div>

    </header>
    <main>

        <div class="panel-header">

            <div class="panel-info">
    
                <h2>Mis productos</h2>
    
                <p>Gestiona lo que tienes a la venta</p>
    
            </div>
    
            <button type="button" id="btnAgregarProducto">
                + Agregar producto
            </button>
    
        </div>    

        <section class="productos">

            <div id="contenedorMisProductos">

            </div>

        </section>
    </main>
    
    <script src="js/venderProductos.js"></script>
</body>
</html>
